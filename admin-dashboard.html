<!DOCTYPE html>
<html lang="si">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline' https://cdn.tailwindcss.com blob:; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; connect-src 'self' https://api.groq.com; img-src 'self' data:;">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>C Pearl White - Admin Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .header-bg { background-color: #2D1B1B; }
        .tab-active { border-bottom: 3px solid #C08497; color: #C08497; font-weight: bold; }
        .input-label { font-size: 11px; font-weight: bold; color: #C08497; text-transform: uppercase; margin-bottom: 4px; display: block; }
        .stat-card { border-left-width: 4px; }
        .btn-pink { background-color: #C08497; }
        .btn-pink:hover { background-color: #a66d80; }
        table th { white-space: nowrap; }
    </style>
</head>
<body class="bg-[#FDF8F8] font-sans">

<header class="header-bg text-white p-3 flex justify-between items-center shadow-md sticky top-0 z-50">
    <h1 class="text-xl italic font-serif ml-4">C Pearl <span class="font-normal">White</span></h1>
    <div class="flex gap-4 items-center text-xs mr-4">
        <span class="bg-black/20 px-3 py-1 rounded">⌛ Active Session</span>
        <button onclick="logout()" class="border border-red-400 text-red-300 px-3 py-1 rounded hover:bg-red-500/10 uppercase font-bold tracking-tighter">Logout</button>
    </div>
</header>

    <div class="flex flex-col lg:flex-row min-h-screen">
        
        <div class="w-full lg:w-[400px] bg-white border-r border-gray-200 flex flex-col h-screen sticky top-14 overflow-y-auto pb-20">
            <div class="flex border-b">
                <button class="flex-1 py-3 text-[11px] font-bold text-gray-400">✏️ MANUAL ENTRY</button>
                <button class="flex-1 py-3 text-[11px] font-bold tab-active">📋 PASTE & IMPORT</button>
            </div>

            <div class="p-4 space-y-5">
                <section>
                    <span class="input-label">🆔 IDS</span>
                    <div class="grid grid-cols-2 gap-3">
                        <input type="text" id="waybillNo" placeholder="Waybill (Auto)" class="w-full border rounded p-2 bg-gray-50 text-xs">
                        <input type="text" id="orderId" placeholder="Order ID (Auto)" class="w-full border rounded p-2 bg-gray-50 text-xs">
                    </div>
                </section>

                <section>
                    <span class="input-label">📋 DETAILS</span>
                    <div class="grid grid-cols-2 gap-3">
                        <select id="salesPerson" class="w-full border rounded p-2 text-xs font-semibold">
                            <option value="">-- Select --</option>
                            <option value="User 1">User 1</option>
                        </select>
                        <input type="date" id="orderDate" value="2026-04-25" class="w-full border rounded p-2 text-xs">
                    </div>
                </section>

                <section>
                    <span class="input-label">💬 WHATSAPP MESSAGE</span>
                    <textarea id="rawMessage" rows="4" class="w-full p-3 border-2 border-pink-50 rounded-lg focus:outline-none text-xs" placeholder="Paste message here..."></textarea>
                    <button onclick="formatWithGroq()" id="btnText" class="w-full mt-2 btn-pink text-white py-2 rounded font-bold text-xs shadow">Format Info ✨</button>
                </section>

                <div class="space-y-2 bg-gray-50 p-3 rounded-lg border">
                    <input type="text" id="outName" oninput="updatePreview()" placeholder="Name" class="w-full p-2 border rounded text-xs">
                    <input type="text" id="outPhone" oninput="updatePreview()" placeholder="Mobile Number 1" class="w-full p-2 border rounded text-xs">
                    <input type="text" id="outPhone2" oninput="updatePreview()" placeholder="Mobile Number 2" class="w-full p-2 border rounded text-xs">
                    <textarea id="outAddress" rows="2" oninput="updatePreview()" placeholder="Address" class="w-full p-2 border rounded text-xs"></textarea>
                    <input type="text" id="outCity" oninput="updatePreview()" placeholder="City" class="w-full p-2 border rounded text-xs">
                    <input type="hidden" id="outProduct">
                </div>

                <section class="bg-pink-50/20 p-3 rounded-lg border border-pink-100">
                    <span class="input-label">🛍 ADD ITEMS</span>
                    <div class="flex flex-wrap gap-2 mt-2">
                        <input type="text" id="productSearch" list="productOptions" onchange="syncPriceFromSearch()" placeholder="Select Product..." class="flex-1 min-w-[120px] p-2 border rounded text-xs font-semibold">
                        <datalist id="productOptions">
                            <option value="VIP Night Face Cream" data-price="3000">
                            <option value="Vip Night Body Cream" data-price="5000">
                            <option value="Night Serum" data-price="2500">
                            <option value="Night Toner" data-price="1500">
                            <option value="Charcoal Soap" data-price="800">
                        </datalist>
                        <input type="number" id="customPrice" placeholder="Price" class="w-20 p-2 border rounded text-xs font-bold">
                        <input type="number" id="prodQty" value="1" class="w-10 p-2 border rounded text-xs text-center">
                        <button onclick="addToCartFromSearch()" class="btn-pink text-white px-3 py-1 rounded font-bold text-xs">ADD</button>
                    </div>
                </section>
            </div>
        </div>

        <div class="flex-1 p-4 lg:p-6 bg-gray-50 space-y-6 overflow-x-hidden">
            
            <div class="grid grid-cols-2 lg:grid-cols-4 gap-4">
                <div class="bg-white p-4 rounded-lg stat-card border-pink-500 shadow-sm">
                    <div id="orderCount" class="text-2xl font-black">0</div>
                    <div class="text-[10px] text-gray-400 uppercase font-bold">Orders</div>
                </div>
                <div class="bg-white p-4 rounded-lg stat-card border-yellow-500 shadow-sm">
                    <div class="text-2xl font-black text-blue-700">Rs. <span id="finalPriceDisplay">0</span></div>
                    <div class="text-[10px] text-gray-400 uppercase font-bold">Total COD</div>
                </div>
                <div class="bg-white p-4 rounded-lg stat-card border-green-500 shadow-sm">
                    <div class="text-2xl font-black">—</div>
                    <div class="text-[10px] text-gray-400 uppercase font-bold">Sales Person</div>
                </div>
                <div class="bg-white p-4 rounded-lg stat-card border-blue-500 shadow-sm">
                    <button class="bg-[#22C55E] text-white w-full h-full rounded font-bold text-xs">EXPORT EXCEL</button>
                </div>
            </div>

            <div class="bg-white rounded-xl shadow-sm border border-pink-100 overflow-hidden">
                <div class="header-bg p-3 flex justify-between items-center">
                    <h4 class="text-white text-xs font-bold uppercase tracking-widest">📦 Orders Preview</h4>
                    <button class="bg-red-500/20 text-red-300 text-[9px] px-3 py-1 rounded border border-red-500/40 font-bold">CLEAR ALL</button>
                </div>
                <div class="overflow-x-auto">
                    <table class="w-full text-[10px] text-left border-collapse min-w-[1000px]">
                        <thead class="bg-[#2D1B1B] text-[#C08497] uppercase">
                            <tr>
                                <th class="p-3 border-r border-white/5">#</th>
                                <th class="p-3 border-r border-white/5">Waybill No</th>
                                <th class="p-3 border-r border-white/5">Order No</th>
                                <th class="p-3 border-r border-white/5">Customer Name</th>
                                <th class="p-3 border-r border-white/5">Address</th>
                                <th class="p-3 border-r border-white/5">Order Description</th>
                                <th class="p-3 border-r border-white/5">Phone 1</th>
                                <th class="p-3 border-r border-white/5">Phone 2</th>
                                <th class="p-3 border-r border-white/5">COD (Rs.)</th>
                                <th class="p-3">City</th>
                                <th class="p-3">Action</th>
                            </tr>
                        </thead>
                        <tbody id="orderTableBody" class="divide-y divide-gray-100">
                            </tbody>
                    </table>
                </div>
            </div>

            <div class="bg-white p-4 rounded-xl shadow-sm border border-orange-100 grid grid-cols-1 md:grid-cols-2 gap-4">
                <div>
                    <span class="input-label text-orange-600">WhatsApp Preview</span>
                    <textarea id="waPreview" rows="8" class="w-full p-3 border rounded bg-yellow-50 text-[10px] font-mono" readonly></textarea>
                </div>
                <div class="space-y-3">
                    <div class="grid grid-cols-2 gap-2">
                        <div>
                            <span class="input-label">Discount</span>
                            <select id="discountRate" onchange="renderCart(); updatePreview();" class="w-full p-2 border rounded text-xs font-bold bg-green-50">
                                <option value="0">0</option><option value="100">100</option><option value="200">200</option><option value="500">500</option>
                            </select>
                        </div>
                        <div>
                            <span class="input-label">Delivery</span>
                            <select id="delOption" onchange="handleDelOption()" class="w-full p-2 border rounded text-xs font-bold">
                                <option value="yes">425.00</option><option value="no">0.00</option>
                            </select>
                        </div>
                    </div>
                    <button onclick="shareToWhatsApp()" class="w-full bg-[#22C55E] text-white py-3 rounded-lg font-bold text-xs shadow-md">SEND TO WHATSAPP 🚀</button>
                    <button onclick="saveOrder()" class="w-full header-bg text-white py-3 rounded-lg font-bold text-xs">SAVE TO DATABASE 💾</button>
                </div>
            </div>
        </div>
    </div>

    <script>
	
		// පිටුව Load වන විටම Login වී ඇත්දැයි පරීක්ෂා කිරීම
		if (sessionStorage.getItem("isLoggedIn") !== "true") {
			window.location.href = "login.html"; // Login වී නැත්නම් ආපසු හරවා යැවීම
		}

		function logout() {
			sessionStorage.removeItem("isLoggedIn");
			window.location.href = "login.html";
		}
	
        let cart = [];
        let deliveryCharge = 425.00;

        function handleDelOption() {
            deliveryCharge = (document.getElementById('delOption').value === "yes") ? 425.00 : 0.00;
            renderCart();
            updatePreview();
        }

        function syncPriceFromSearch() {
            const val = document.getElementById('productSearch').value;
            const opts = document.getElementById('productOptions').options;
            for (let i = 0; i < opts.length; i++) {
                if (opts[i].value === val) {
                    document.getElementById('customPrice').value = opts[i].getAttribute('data-price');
                    break;
                }
            }
        }

        function addToCartFromSearch() {
            const name = document.getElementById('productSearch').value;
            const price = parseFloat(document.getElementById('customPrice').value);
            const qty = parseFloat(document.getElementById('prodQty').value);
            if (!name || isNaN(price)) return alert("Select product!");
            
            cart.push({ name, price, qty });
            renderCart();
            updatePreview();
        }

        function removeFromCart(index) {
            cart.splice(index, 1);
            renderCart();
            updatePreview();
        }

        function renderCart() {
            const tbody = document.getElementById('orderTableBody');
            tbody.innerHTML = '';
            
            const name = document.getElementById('outName').value;
            const addr = document.getElementById('outAddress').value;
            const p1 = document.getElementById('outPhone').value;
            const p2 = document.getElementById('outPhone2').value;
            const city = document.getElementById('outCity').value;
            const waybill = document.getElementById('waybillNo').value || "Auto";
            const orderId = document.getElementById('orderId').value || "Auto";

            let subtotal = 0;
            let description = cart.map(item => `${item.name} (${item.qty})`).join(", ");
            
            cart.forEach(item => subtotal += (item.price * item.qty));
            
            const discount = parseFloat(document.getElementById('discountRate').value) || 0;
            const final = subtotal > 0 ? (subtotal + deliveryCharge - discount) : 0;

            if (cart.length > 0) {
                tbody.innerHTML = `
                    <tr class="hover:bg-pink-50/30">
                        <td class="p-3">1</td>
                        <td class="p-3 font-bold">${waybill}</td>
                        <td class="p-3">${orderId}</td>
                        <td class="p-3 font-bold">${name}</td>
                        <td class="p-3 text-gray-500">${addr}</td>
                        <td class="p-3 text-blue-600 font-medium">${description}</td>
                        <td class="p-3">${p1}</td>
                        <td class="p-3">${p2}</td>
                        <td class="p-3 font-black text-red-600">Rs. ${final.toFixed(2)}</td>
                        <td class="p-3">${city}</td>
                        <td class="p-3 text-center">
                            <button onclick="removeFromCart(0)" class="text-red-500 font-bold">✕</button>
                        </td>
                    </tr>
                `;
            } else {
                tbody.innerHTML = '<tr><td colspan="11" class="p-10 text-center text-gray-300 italic">No orders added to preview.</td></tr>';
            }

            document.getElementById('finalPriceDisplay').innerText = final.toFixed(2);
            document.getElementById('orderCount').innerText = cart.length > 0 ? 1 : 0;
        }

        function updatePreview() {
            const name = document.getElementById('outName').value || "...";
            const address = document.getElementById('outAddress').value || "...";
            const phone = document.getElementById('outPhone').value || "...";
            const discount = parseFloat(document.getElementById('discountRate').value) || 0;

            let subtotal = 0;
            let itemsList = "";
            cart.forEach((item, i) => {
                subtotal += (item.price * item.qty);
                itemsList += `• ${item.name} x${item.qty}\n`;
            });

            const final = subtotal > 0 ? (subtotal + deliveryCharge - discount) : 0;
            
            let msg = `🌸 *C Pearl White - Order* 🌸\n`;
            msg += `👤 Name: ${name}\n`;
            msg += `📱 Phone: ${phone}\n`;
            msg += `📍 Address: ${address}\n\n`;
            msg += `📦 Items:\n${itemsList || "None"}\n`;
            msg += `💰 *TOTAL COD: Rs. ${final.toFixed(2)}*`;

            document.getElementById('waPreview').value = msg;
            renderCart(); // Table එකත් update කරන්න
        }

        async function formatWithGroq() {
            let rawText = document.getElementById('rawMessage').value;
            const btn = document.getElementById('btnText');
            if (!rawText) return alert("Paste message!");
            btn.innerText = "Wait...";
            btn.disabled = true;
            try {
                const response = await fetch('/format-info', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ rawText: rawText })
                });
                const data = await response.json();
                const result = JSON.parse(data.choices[0].message.content);
                document.getElementById('outName').value = result.name || "";
                document.getElementById('outAddress').value = result.address || "";
                document.getElementById('outPhone').value = result.phone || "";
                document.getElementById('outPhone2').value = result.phone2 || "";
                document.getElementById('outCity').value = result.city || "";
                updatePreview();
            } catch (error) {
                alert("AI Error!");
            } finally {
                btn.innerText = "Format Info ✨";
                btn.disabled = false;
            }
        }

        function shareToWhatsApp() {
            const message = document.getElementById('waPreview').value;
            window.open(`https://wa.me/?text=${encodeURIComponent(message)}`, '_blank');
        }

        function saveOrder() { alert("Saved!"); }
    </script>
</body>
</html>
